services:
  - type: web
    name: bimphotosync-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_INLINE_AI_WORKER
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: bimphotosync-redis
          property: connectionString
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_REPORT_MODEL
        value: gemini-3.1-flash-lite-preview

  - type: keyvalue
    name: bimphotosync-redis
    plan: free
    ipAllowList: []
